<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Waifu App</title>

<style>
body {
  background: #0f0f0f;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1a1a1a;
  border-radius: 15px;
  overflow: hidden;
  position: relative;
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.name {
  position: absolute;
  bottom: 10px;
  left: 10px;
  font-weight: bold;
}

button {
  margin: 20px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>🔥 Your Waifu</h1>

<button onclick="loadWaifus()">Обновить</button>

<div class="grid" id="grid"></div>

<script>
const names = ["Руби", "Илина", "Николь", "Луна", "Мика", "Сора"];

async function loadWaifus() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let i = 0; i < 6; i++) {
    const res = await fetch("https://api.waifu.pics/sfw/waifu");
    const data = await res.json();

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${data.url}">
      <div class="name">${names[i]}</div>
    `;

    grid.appendChild(card);
  }
}

loadWaifus();
</script>

</body>
</html>
