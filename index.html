<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Your Waifu</title>

<style>
body {
    background: #0b0b1a;
    color: white;
    font-family: Arial;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 20px;
}

.card {
    background: #1c1c3a;
    border-radius: 15px;
    padding: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

img {
    width: 100%;
    border-radius: 10px;
}

h2 {
    margin: 5px 0;
}
</style>
</head>

<body>

<h1>💖 Выбери вайфу</h1>

<div class="grid">

<div class="card" onclick="selectGirl('Илина')">
    <img src="https://i.imgur.com/3ZQ3Z3Z.png">
    <h2>Илина</h2>
</div>

<div class="card" onclick="selectGirl('Плюшка')">
    <img src="https://i.imgur.com/3ZQ3Z3Z.png">
    <h2>Плюшка</h2>
</div>

<div class="card" onclick="selectGirl('Николь')">
    <img src="https://i.imgur.com/3ZQ3Z3Z.png">
    <h2>Николь</h2>
</div>

<div class="card" onclick="selectGirl('Руби')">
    <img src="https://i.imgur.com/3ZQ3Z3Z.png">
    <h2>Руби</h2>
</div>

</div>

<script>
function selectGirl(name) {
    localStorage.setItem("waifu", name)
    window.location.href = "chat.html"
}
</script>

</body>
</html>
